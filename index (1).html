<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apollo Flooring CRM</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: Georgia, 'Times New Roman', serif; background: #0D1B2E; color: #E8EEF5; font-size: 15px; }
    a { text-decoration: none; color: inherit; }
    button { font-family: Georgia, serif; cursor: pointer; }
    input, select, textarea { font-family: Georgia, serif; outline: none; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #1E3050; border-radius: 4px; }

    /* ── Layout ── */
    #app { display: flex; min-height: 100vh; }
    #main { flex: 1; min-width: 0; }
    #topbar { position: sticky; top: 0; z-index: 600; background: #071221; border-bottom: 1px solid #142035; padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
    #content { padding: 20px 16px 100px; max-width: 680px; margin: 0 auto; }

    /* ── Topbar ── */
    #page-title { font-weight: bold; font-size: 15px; color: #E8EEF5; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Form ── */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; color: #4A6080; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .inp { background: #071221; border: 1px solid #1E3A5F; border-radius: 10px; color: #E8EEF5; padding: 12px 14px; font-size: 15px; width: 100%; font-family: Georgia, serif; }
    .inp:focus { border-color: #2563BE; }
    .btn-gold { background: #2563BE; color: #fff; border: none; border-radius: 10px; padding: 13px 22px; font-weight: bold; font-size: 14px; font-family: Georgia, serif; width: 100%; }
    .btn-ghost { background: transparent; border: 1px solid #1E3A5F; color: #7EB3E8; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-family: Georgia, serif; }
    .btn-danger { border-color: #DC2626; color: #F87171; }

    /* ── Cards ── */
    .card { background: #0F2035; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #1A3555; }
    .cust-row { background: #0F2035; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; border: 1px solid #1A3555; display: flex; justify-content: space-between; align-items: center; gap: 10px; transition: border-color .15s; }
    .cust-row:hover { border-color: #2563BE; }

    /* ── Stat Cards ── */
    .stat-card { background: #0F2035; border-radius: 12px; padding: 18px 14px; border: 1px solid #1A3555; }
    .stat-val { font-size: 26px; font-weight: bold; }
    .stat-lbl { font-size: 12px; color: #4A6080; margin-top: 2px; }

    /* ── Pricing ── */
    .filter-tab { background: #0F2035; border: 1px solid #1A3555; color: #7EB3E8; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-family: Georgia, serif; cursor: pointer; }
    .filter-tab.active { background: #2563BE; border-color: #2563BE; color: #fff; }
    .price-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid #0A1525; gap: 12px; }
    .price-service { font-size: 14px; color: #C8D8E8; flex: 1; line-height: 1.5; }
    .price-val { font-size: 15px; font-weight: bold; color: #7EB3E8; white-space: nowrap; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,5,15,.88); z-index: 800; align-items: flex-end; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #0D1B2E; border-radius: 20px 20px 0 0; padding: 28px 20px 44px; width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; border: 1px solid #1E3A5F; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 18px; font-weight: bold; color: #E8EEF5; }
    .modal-close { background: none; border: none; color: #4A6080; font-size: 24px; line-height: 1; cursor: pointer; }

    /* ── Toast ── */
    #toast { position: fixed; top: 14px; right: 14px; left: 14px; z-index: 9999; max-width: 360px; margin: 0 auto; background: #2563BE; color: #fff; padding: 12px 18px; border-radius: 10px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 24px rgba(0,0,0,.5); display: none; animation: fadeSlide .3s ease; }
    @keyframes fadeSlide { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }

    /* ── Sections ── */
    .sec-lbl { font-size: 11px; color: #2563BE; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
    .empty { color: #1E3A5F; font-size: 14px; padding: 18px 0; text-align: center; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  </style>
</head>
<body>
<div id="app">
  <!-- Topbar -->
  <div id="topbar">
    <div id="page-title">Apollo CRM</div>
  </div>

  <!-- Main Content -->
  <div id="main">
    <div id="content"><div style="display:flex;align-items:center;justify-content:center;height:60vh;color:#1E3A5F;font-size:14px;letter-spacing:2px;text-transform:uppercase">Loading...</div></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Price Sheet Modal -->
<div class="modal-overlay" id="modal-sheet">
  <div class="modal-box" id="sheet-modal-body">
    <!-- filled dynamically -->
  </div>
</div>

<!-- Navigation -->
<div style="position:fixed;bottom:20px;right:20px;z-index:500;display:flex;gap:10px;flex-direction:column">
  <button data-nav="dashboard" style="background:#2563BE;color:#fff;border:none;border-radius:50%;width:56px;height:56px;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,190,.4)">📊</button>
  <button data-nav="prices" style="background:#2563BE;color:#fff;border:none;border-radius:50%;width:56px;height:56px;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,190,.4)">💰</button>
</div>

<script src="app.js"></script>
</body>
</html>
